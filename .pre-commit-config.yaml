exclude: (/dist/|/__pycache__/)
repos:
  - repo: local
    hooks:
      - id: format
        name: Format
        entry: make format
        language: system
        pass_filenames: false

      - id: lint
        name: Lint
        entry: make lint
        language: system
        pass_filenames: false

      - id: type-check
        name: Type check
        entry: make typecheck
        language: system
        pass_filenames: false
